<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>emoplant forum</title>
<style>
body{margin:0;font-family:Arial;background:#0b0b0b;color:#ddd}
header{
  background:linear-gradient(90deg,#8b0000,#ff0000);
  padding:30px;
  text-align:center;
  font-size:40px;
  font-weight:bold;
  color:white;
}
nav{
  background:#1a1a1a;
  padding:10px;
  display:flex;
  gap:20px;
  justify-content:center;
  border-bottom:2px solid #ff0040;
}
nav div{cursor:pointer}
.container{max-width:1000px;margin:20px auto;padding:10px}
.category{
  border:1px solid #333;
  margin:15px 0;
  border-radius:8px;
}
.category h2{
  margin:0;
  padding:10px;
  background:#111;
  border-bottom:1px solid #333;
  color:#ff3366;
}
.topic{
  padding:10px;
  border-top:1px solid #222;
  cursor:pointer;
}
.topic:hover{background:#1c1c1c}
button,input,textarea{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:6px;
  border:none;
}
button{background:#ff0040;color:white;font-weight:bold;cursor:pointer}
#topicPage{display:none}
.message{
  border-top:1px solid #333;
  padding:10px 0;
}
.back{background:#333}
</style>
</head>
<body>

<header>🌱 EMOPLANT FORUM</header>

<nav>
  <div>Форумы</div>
  <div>Правила</div>
  <div>Поддержка</div>
</nav>

<div class="container" id="home">

  <div class="category">
    <h2>📢 Информация</h2>
    <div class="topic" onclick="openTopic('info')">Объявления проекта</div>
  </div>

  <div class="category">
    <h2>💬 Общение</h2>
    <div class="topic" onclick="openTopic('chat')">Флудилка</div>
  </div>

</div>

<div class="container" id="topicPage">
  <button class="back" onclick="goHome()">← Назад</button>
  <h2 id="topicTitle"></h2>

  <div id="messages"></div>

  <textarea id="msgInput" placeholder="Сообщение"></textarea>
  <button onclick="sendMessage()">Отправить</button>
</div>

<script>
let data = JSON.parse(localStorage.getItem('emoplant_data')||'{}');
let current='';

function save(){localStorage.setItem('emoplant_data',JSON.stringify(data));}

function openTopic(name){
  current=name;
  if(!data[name]) data[name]=[];
  document.getElementById('home').style.display='none';
  document.getElementById('topicPage').style.display='block';
  document.getElementById('topicTitle').innerText=name;
  render();
}

function goHome(){
  document.getElementById('home').style.display='block';
  document.getElementById('topicPage').style.display='none';
}

function render(){
  let el=document.getElementById('messages');
  el.innerHTML='';
  data[current].forEach(m=>{
    el.innerHTML+=`<div class="message">${m}</div>`;
  });
}

function sendMessage(){
  let msg=document.getElementById('msgInput').value;
  if(!msg) return;
  data[current].push(msg);
  save();
  render();
  document.getElementById('msgInput').value='';
}
</script>

</body>
</html>
